<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub de Processos de Auditoria – TSE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #F0F4F8;
  --bg2: #E1EAF2;
  --surface: #FFFFFF;
  --surface2: #F8FAFC;
  
  --primary: #0073E6; 
  --primary-light: #4D9FFF; 
  --primary-faded: #E6F0FA; 
  
  --text: #1A2733;
  --text2: #4A5B6E;
  --text3: #7D8FA3;
  --border: #CDE0F5;
  
  --shadow: 0 4px 12px rgba(0, 115, 230, 0.08);
  --shadow-lg: 0 8px 32px rgba(0, 115, 230, 0.15);
  --radius: 12px;
  --transition: 200ms cubic-bezier(.4,0,.2,1);
  --sidebar-w: 240px;
  
  --phase1: #005BB5;
  --phase2: #0073E6;
  --phase3: #008CFF;
}

[data-theme="dark"] {
  --bg: #0F172A;
  --bg2: #1E293B;
  --surface: #1E293B;
  --surface2: #273447;
  
  --primary: #3399FF;
  --primary-light: #66B2FF;
  --primary-faded: #132338;
  
  --text: #F1F5F9;
  --text2: #CBD5E1;
  --text3: #94A3B8;
  --border: #334155;
  
  --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
  
  --phase1: #3399FF;
  --phase2: #66B2FF;
  --phase3: #99CCFF;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  transition: background var(--transition), color var(--transition);
}

/* HEADER */
header {
  background: var(--primary);
  color: #fff;
  padding: 0 28px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 16px rgba(0, 115, 230, 0.2);
  position: sticky;
  top: 0;
  z-index: 100;
  transition: background var(--transition);
}

[data-theme="dark"] header {
  background: var(--surface);
  box-shadow: 0 2px 16px rgba(0, 0, 0, 0.4);
  border-bottom: 1px solid var(--border);
}
.header-brand { display: flex; align-items: center; gap: 14px; }
.header-seal{
    width: 75px;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--transition), box-shadow var(--transition);
}

[data-theme="dark"] .header-seal { 
    background: transparent; 
    box-shadow: none;
} 
.header-text h1 {
  font-family: 'Montserrat', serif;
  font-size: 16px; font-weight: 700; letter-spacing: .3px;
  text-transform: uppercase;
}
.header-text p { font-size: 11px; opacity: .85; letter-spacing: .6px; text-transform: uppercase; }
.header-actions { display: flex; align-items: center; gap: 10px; }
.btn-toggle {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff; border-radius: 8px;
  padding: 7px 14px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background var(--transition);
}
.btn-toggle:hover { background: rgba(255,255,255,0.25); }

/* TOP BANNER / NAVIGATION TABS */
.top-banner {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.02);
  z-index: 90;
  overflow-x: auto;
  white-space: nowrap;
  -ms-overflow-style: none;  /* IE and Edge */
  scrollbar-width: none;  /* Firefox */
}
.top-banner::-webkit-scrollbar { display: none; } /* Safari and Chrome */

.top-banner > i {
  color: var(--primary);
  font-size: 16px;
  padding: 16px 0;
  flex-shrink: 0;
}
[data-theme="dark"] .top-banner > i { color: var(--primary-light); }

.audit-tabs {
  display: flex;
  gap: 4px;
}

.audit-tab {
  background: transparent;
  border: none;
  padding: 16px 14px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all var(--transition);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.audit-tab:hover {
  color: var(--primary-light);
}
.audit-tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}
[data-theme="dark"] .audit-tab.active {
  color: var(--primary-light);
  border-bottom-color: var(--primary-light);
}

/* LAYOUT */
.app-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* NAVEGAÇÃO LATERAL */
.sidebar {
  width: var(--sidebar-w);
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 14px;
  display: flex; flex-direction: column; gap: 8px;
  flex-shrink: 0;
  overflow-y: auto;
  transition: background var(--transition), border var(--transition);
}
.sidebar-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--primary);
  padding: 0 10px; margin-bottom: 4px;
}
[data-theme="dark"] .sidebar-label { color: var(--primary-light); }
.phase-btn {
  width: 100%; text-align: left;
  background: none; border: 1.5px solid transparent;
  border-radius: 10px; padding: 11px 14px;
  cursor: pointer; color: var(--text2);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13.5px; font-weight: 500;
  display: flex; align-items: center; gap: 10px;
  transition: all var(--transition);
  position: relative;
}
.phase-btn .phase-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0; transition: transform var(--transition);
}
.phase-btn:hover { background: var(--bg2); color: var(--text); }
.phase-btn.active {
  background: var(--primary-faded);
  border-color: var(--primary-light);
  color: var(--primary);
  font-weight: 600;
}
.phase-btn.active .phase-dot { transform: scale(1.4); }
.phase-btn[data-phase="0"] .phase-dot { background: var(--phase1); }
.phase-btn[data-phase="1"] .phase-dot { background: var(--phase2); }
.phase-btn[data-phase="2"] .phase-dot { background: var(--phase3); }
.phase-steps-count {
  margin-left: auto;
  font-size: 10px;
  background: var(--bg2);
  padding: 2px 7px; border-radius: 20px;
  color: var(--text3);
}
.phase-btn.active .phase-steps-count {
  background: var(--primary);
  color: #fff;
}

.sidebar-divider { height: 1px; background: var(--border); margin: 8px 0; }
.sidebar-info {
  margin-top: auto;
  padding: 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 12px; color: var(--text2);
  line-height: 1.5;
}
.sidebar-info i { color: var(--primary); margin-right: 6px; font-size: 14px; }
.sidebar-info strong { color: var(--text); display: block; margin-bottom: 4px; }

/* MAIN */
main {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* HEADER FASES*/
.phase-header {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 16px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--border);
}
.phase-title {
  display: flex; align-items: center; gap: 16px;
}
.phase-icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #fff; flex-shrink: 0;
  box-shadow: var(--shadow);
}
.phase-icon.p0 { background: var(--phase1); }
.phase-icon.p1 { background: var(--phase2); }
.phase-icon.p2 { background: var(--phase3); }
.phase-name {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 700; color: var(--text);
}
.phase-sub { font-size: 14px; color: var(--text3); margin-top: 2px; }

.btn-export {
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text2); border-radius: 9px;
  padding: 8px 16px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 500;
  transition: all var(--transition);
}
.btn-export:hover { border-color: var(--primary); color: var(--primary); box-shadow: var(--shadow); }

/* 3-COL GRID */
.cols-grid {
  display: grid;
  grid-template-columns: 240px 1fr 240px;
  gap: 24px;
  align-items: start;
}
.col-header {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text3);
  padding: 0 0 12px;
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.col-header i { font-size: 13px; color: var(--primary); }

/* ATORES */
.actor-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 12px;
  display: flex; align-items: flex-start; gap: 12px;
  cursor: default;
  transition: all var(--transition);
  box-shadow: 0 2px 8px rgba(0,0,0,0.02);
}
.actor-card:hover { transform: translateX(4px); border-color: var(--primary-light); }
.actor-icon {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--primary-faded);
  display: flex; align-items: center; justify-content: center;
  color: var(--primary); font-size: 14px; flex-shrink: 0;
}
.actor-name { font-size: 13.5px; font-weight: 600; color: var(--text); }
.actor-role { font-size: 11.5px; color: var(--text3); margin-top: 3px; line-height: 1.4; }

/* FLUXO ETAPAS */
.step-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: var(--shadow);
  position: relative;
}
.step-card:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
}
.step-num {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.step-badge {
  padding: 3px 10px; border-radius: 20px;
  font-size: 10.5px; font-weight: 700;
  color: #fff;
}
.step-badge.p0 { background: var(--phase1); }
.step-badge.p1 { background: var(--phase2); }
.step-badge.p2 { background: var(--phase3); }
.step-title {
  font-size: 16px; font-weight: 600; color: var(--text);
  margin-bottom: 6px;
}
.step-desc { font-size: 13.5px; color: var(--text2); line-height: 1.6; }

.step-card-footer {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--border);
  font-size: 12px; color: var(--primary); font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}

/* SETAS ENTRE ETAPAS */
.step-arrow {
  text-align: center; 
  padding: 8px 0;
  color: var(--primary-light); 
  font-size: 20px;
  animation: floatArrow 2s infinite ease-in-out;
}
@keyframes floatArrow {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(4px); }
}

/* ARTEFATOS */
.artifact-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: 0 2px 8px rgba(0,0,0,0.02);
}
.artifact-card:hover { border-color: var(--primary); transform: translateX(-4px); }
.artifact-name {
  font-size: 13px; font-weight: 600; color: var(--text);
  display: flex; align-items: flex-start; gap: 10px;
  line-height: 1.4;
}
.artifact-name i { color: var(--primary-light); margin-top: 2px; flex-shrink: 0; font-size: 14px;}
.artifact-step { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* ESTADO VAZIO (EM CONSTRUÇÃO) */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
  height: 100%;
}
.empty-state i {
  font-size: 48px;
  color: var(--border);
  margin-bottom: 20px;
}
.empty-state h2 {
  font-size: 20px;
  color: var(--text);
  margin-bottom: 8px;
}

/* TOOLTIP */
.tooltip {
  position: fixed; z-index: 200;
  background: var(--surface);
  border: 1.5px solid var(--primary);
  border-radius: 10px; padding: 14px 18px;
  box-shadow: var(--shadow-lg);
  max-width: 280px;
  font-size: 12.5px; color: var(--text2); line-height: 1.5;
  pointer-events: none;
  opacity: 0; transform: translateY(4px);
  transition: opacity 150ms, transform 150ms;
}
.tooltip.show { opacity: 1; transform: translateY(0); }
.tooltip-title { font-weight: 700; color: var(--primary); margin-bottom: 6px; font-size: 14px; }

/* MODAL */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0, 30, 60, 0.5); 
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 250ms ease;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0, 115, 230, 0.15);
  max-width: 650px; width: 100%;
  max-height: 85vh; overflow-y: auto;
  transform: scale(.96) translateY(12px);
  transition: transform 250ms cubic-bezier(.4,0,.2,1);
}
.modal-backdrop.open .modal { transform: scale(1) translateY(0); }
.modal-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
  position: sticky; top: 0;
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  z-index: 10;
}
.modal-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text); }
.modal-subtitle { font-size: 13px; color: var(--text3); margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;}
.modal-close {
  background: var(--bg2); border: none; cursor: pointer;
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2); flex-shrink: 0;
  transition: all var(--transition);
}
.modal-close:hover { background: var(--primary-faded); color: var(--primary); transform: rotate(90deg); }
.modal-body { padding: 24px 28px 32px; display: flex; flex-direction: column; gap: 24px; }
.modal-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--primary); margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.modal-desc { font-size: 14.5px; color: var(--text2); line-height: 1.7; text-align: justify; }
.modal-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.modal-tag {
  padding: 6px 12px; border-radius: 8px;
  font-size: 12.5px; font-weight: 500;
  background: var(--primary-faded); color: var(--text);
  border: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}
.modal-tag.actor i, .modal-tag.artifact i { color: var(--primary); }

/* ANIMAÇÕES */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.anim { animation: fadeInUp 300ms ease both; }
.anim-d1 { animation-delay: 50ms; }
.anim-d2 { animation-delay: 100ms; }
.anim-d3 { animation-delay: 150ms; }
.anim-d4 { animation-delay: 200ms; }
.anim-d5 { animation-delay: 250ms; }

/* RESPONSIVIDADE */
@media (max-width: 1023px) {
  .sidebar { width: 70px; padding: 20px 8px; }
  .sidebar-label, .phase-steps-count, .sidebar-info, .sidebar-divider, .phase-btn span { display: none; }
  .phase-btn { padding: 12px; justify-content: center; }
  .phase-btn .phase-dot { width: 10px; height: 10px; }
  .cols-grid { grid-template-columns: 1fr 1fr; }
  .cols-grid > :last-child { grid-column: 1/-1; }
}
@media (max-width: 767px) {
  main { padding: 20px; }
  .cols-grid { grid-template-columns: 1fr; }
  .cols-grid > :last-child { grid-column: auto; }
  .phase-header { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<header>
  <div class="header-brand">
    <div class="header-seal">
      <img src="logo-tse.png" alt="Logo TSE" style="width: 100%; height: 100%; object-fit: contain;">
    </div>
    <div class="header-text">
      <h1>Secretaria de Auditoria</h1>
      <p>Tribunal Superior Eleitoral</p>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-toggle" onclick="toggleTheme()" aria-label="Alternar tema">
      <i class="fa-solid fa-circle-half-stroke" id="theme-icon"></i>
      <span id="theme-label">Modo Escuro</span>
    </button>
  </div>
</header>

<div class="top-banner" aria-label="Navegação de Processos de Auditoria">
  <i class="fa-solid fa-scale-balanced"></i>
  <div class="audit-tabs" id="audit-tabs-container">
    <button class="audit-tab active" onclick="setAuditProcess('ordinaria')">Auditoria Ordinária</button>
    <button class="audit-tab" onclick="setAuditProcess('continua')">Auditoria Contínua</button>
    <button class="audit-tab" onclick="setAuditProcess('pre_encerramento')">Auditoria de Contas Pré-Encerramento</button>
    <button class="audit-tab" onclick="setAuditProcess('pos_encerramento')">Auditoria de Contas Pós-Encerramento</button>
    <button class="audit-tab" onclick="setAuditProcess('consultoria')">Consultoria</button>
    <button class="audit-tab" onclick="setAuditProcess('monitoramento_1')">Monitoramento 1º Ciclo</button>
    <button class="audit-tab" onclick="setAuditProcess('monitoramento_2')">Monitoramento 2º Ciclo</button>
  </div>
</div>

<div class="app-body">
  <nav class="sidebar" role="navigation" aria-label="Fases do Processo Selecionado">
    <div class="sidebar-label" id="sidebar-process-label">Fases</div>
    
    <div id="sidebar-phases-container"></div>
    
    <div class="sidebar-divider"></div>
    <div class="sidebar-info">
      <strong><i class="fa-solid fa-lightbulb"></i> Como usar</strong>
      Selecione as etapas no fluxo central para compreender os objetivos, atores envolvidos e documentos elaborados.
    </div>
  </nav>

  <main id="main-area" role="main" aria-label="Conteúdo principal"></main>
</div>

<div class="tooltip" id="tooltip" role="tooltip" aria-hidden="true">
  <div class="tooltip-title" id="tooltip-title"></div>
  <div id="tooltip-body"></div>
</div>

<div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title-text" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-subtitle" id="modal-subtitle"></div>
        <div class="modal-title" id="modal-title-text"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()" aria-label="Fechar"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// --- BANCO DE DADOS GERAL DE PROCESSOS --- //

const ACTOR_META = {
  "Auditado": { icon: "fa-solid fa-building-columns", role: "Unidade ou setor sob auditoria" },
  "Equipe de Auditoria": { icon: "fa-solid fa-users", role: "Servidores responsáveis pela execução" },
  "Seção de Auditoria": { icon: "fa-solid fa-sitemap", role: "Supervisão técnica inicial" },
  "COAUD/COAUG": { icon: "fa-solid fa-user-tie", role: "Coordenação de Auditoria e Controle" },
  "SAU": { icon: "fa-solid fa-landmark", role: "Secretaria de Auditoria" },
  "DG": { icon: "fa-solid fa-star", role: "Diretoria-Geral (Alta Administração)" }
};

const ARTIFACT_DESC = {
  "Memorando de Abertura": "Documento formal que comunica o início oficial dos trabalhos de auditoria.",
  "Entendimento Preliminar do Objeto": "Coleta aprofundada de normativos e evidências específicas do processo em foco.",
  "Primeira Aplicação de Testes": "",
  "Primeiro Relatório de Auditoria":"",
  "Segunda Aplicação de Testes":"",
  "Segundo Relatório de Auditoria":"",
  "Terceira Aplicação de Testes":"",
  "Terceiro Relatório de Auditoria":"",
  "Relatório Executivo": "",
  "Plano de Trabalho": "Guia que define o escopo, cronograma, recursos e responsabilidades da auditoria.",
  "Ata de Reunião": "Registro formal que documenta o que foi discutido e acordado entre as partes.",
  "Mapeamento do Processo": "Representação visual ou descritiva do fluxo de trabalho da unidade auditada.",

// ESTADO GLOBAL
let currentProcessKey = 'ordinaria';
let currentPhaseIndex = 0;
let dark = false;


// --- LÓGICA DE INTERFACE --- //

// Função para trocar o tipo de auditoria principal (Menu do Topo)
function setAuditProcess(processKey) {
  currentProcessKey = processKey;
  currentPhaseIndex = 0; // Reseta para a primeira fase do novo processo

  // Atualizar visual das abas do topo
  const tabs = document.getElementById('audit-tabs-container').children;
  for (let tab of tabs) {
    tab.classList.remove('active');
    if (tab.getAttribute('onclick').includes(processKey)) {
      tab.classList.add('active');
    }
  }

  renderSidebar();
  renderMainArea();
}

// Renderiza a barra lateral dependendo do processo selecionado
function renderSidebar() {
  const processData = AUDIT_TYPES[currentProcessKey];
  const container = document.getElementById('sidebar-phases-container');
  const label = document.getElementById('sidebar-process-label');
  
  label.textContent = processData.title;

  if (!processData.phases) {
    container.innerHTML = ''; // Se não há dados, não renderiza abas laterais
    return;
  }

  container.innerHTML = processData.phases.map((phase, idx) => `
    <button class="phase-btn ${idx === currentPhaseIndex ? 'active' : ''}" data-phase="${idx}" onclick="setPhase(${idx})" aria-label="Fase ${phase.name}">
      <span class="phase-dot" style="background-color: var(--phase${idx+1})"></span>
      <span>${phase.name}</span>
      <span class="phase-steps-count">${phase.steps.length} etapas</span>
    </button>
  `).join('');
}

// Função para trocar a fase dentro de um processo (Sidebar)
function setPhase(idx) {
  currentPhaseIndex = idx;
  const buttons = document.querySelectorAll('.phase-btn');
  buttons.forEach(b => b.classList.remove('active'));
  document.querySelector(`.phase-btn[data-phase="${idx}"]`).classList.add('active');
  renderMainArea();
}

// Renderiza o conteúdo central (Fluxos)
function renderMainArea() {
  const processData = AUDIT_TYPES[currentProcessKey];
  const mainArea = document.getElementById('main-area');

  // Estado Vazio (Para fluxos não mapeados ainda)
  if (!processData.phases) {
    mainArea.innerHTML = `
      <div class="empty-state anim">
        <i class="fa-solid fa-person-digging"></i>
        <h2>Fluxo em mapeamento</h2>
        <p>Os processos detalhados para <strong>${processData.title}</strong> serão inseridos em breve.</p>
      </div>
    `;
    return;
  }

  const phase = processData.phases[currentPhaseIndex];
  const allActors = [...new Set(phase.steps.flatMap(s => s.actors))];
  const allArtifacts = phase.steps.flatMap((s, si) =>
    s.artifacts.map(a => ({ name: a, step: si + 1 }))
  );

  mainArea.innerHTML = `
    <div class="phase-header anim">
      <div class="phase-title">
        <div class="phase-icon ${phase.cls}"><i class="${phase.icon}"></i></div>
        <div>
          <div class="phase-name">${phase.name}</div>
          <div class="phase-sub">Compreenda as ${phase.steps.length} etapas centrais, ${allActors.length} papéis de atuação e ${allArtifacts.length} artefatos gerados.</div>
        </div>
      </div>
      <div>
        <button class="btn-export" onclick="exportPhase()" aria-label="Exportar Mapa do Processo">
          <i class="fa-solid fa-file-pdf"></i> Baixar Mapa Estrutural
        </button>
      </div>
    </div>

    <div class="cols-grid">
      <div>
        <div class="col-header"><i class="fa-solid fa-users"></i> Papéis de Atuação</div>
        ${allActors.map((a, i) => {
          const meta = ACTOR_META[a] || { icon: "fa-solid fa-user", role: "" };
          return `<div class="actor-card anim anim-d${Math.min(i+1,5)}" aria-label="Ator: ${a}">
            <div class="actor-icon"><i class="${meta.icon}"></i></div>
            <div>
              <div class="actor-name">${a}</div>
              <div class="actor-role">${meta.role}</div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div>
        <div class="col-header"><i class="fa-solid fa-diagram-project"></i> Fluxo de Processos</div>
        ${phase.steps.map((step, si) => `
          <div class="step-card anim anim-d${Math.min(si+1,5)}"
               onclick="openStepModal(${si})"
               aria-label="Etapa ${si+1}: ${step.title}"
               role="button" tabindex="0"
               onkeydown="if(event.key==='Enter')openStepModal(${si})">
            <div class="step-num">
              <span class="step-badge ${phase.cls}">Etapa ${si+1}</span>
            </div>
            <div class="step-title">${step.title}</div>
            <div class="step-desc">${step.desc}</div>
            <div class="step-card-footer"><i class="fa-solid fa-book-open"></i> Explorar Detalhes</div>
          </div>
          ${si < phase.steps.length - 1 ? '<div class="step-arrow" aria-hidden="true"><i class="fa-solid fa-arrow-down"></i></div>' : ''}
        `).join('')}
      </div>

      <div>
        <div class="col-header"><i class="fa-solid fa-file-lines"></i> Artefatos Produzidos</div>
        ${allArtifacts.map((a, i) => `
          <div class="artifact-card anim anim-d${Math.min(i+1,5)}"
               onmouseenter="showTooltip(event,'${a.name}')"
               onmouseleave="hideTooltip()"
               onclick="showTooltip(event,'${a.name}',true)"
               aria-label="Artefato: ${a.name}">
            <div class="artifact-name"><i class="fa-solid fa-file-invoice"></i> ${a.name}</div>
            <div class="artifact-step">Relativo à Etapa ${a.step}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// --- MODAIS E TOOLTIPS --- //

function openStepModal(si) {
  const phase = AUDIT_TYPES[currentProcessKey].phases[currentPhaseIndex];
  const step = phase.steps[si];

  document.getElementById('modal-title-text').textContent = step.title;
  document.getElementById('modal-subtitle').textContent = `Fase de ${phase.name} · Etapa ${si + 1}`;

  document.getElementById('modal-body').innerHTML = `
    <div>
      <div class="modal-section-title"><i class="fa-solid fa-align-left"></i> Entendendo a Etapa</div>
      <div class="modal-desc">${step.fullDesc}</div>
    </div>
    <div>
      <div class="modal-section-title"><i class="fa-solid fa-users-gear"></i> Quem participa</div>
      <div class="modal-tags">
        ${step.actors.map(a => `<span class="modal-tag actor"><i class="fa-solid fa-user"></i> ${a}</span>`).join('')}
      </div>
    </div>
    <div>
      <div class="modal-section-title"><i class="fa-solid fa-folder-open"></i> O que é produzido</div>
      <div class="modal-tags">
        ${step.artifacts.map(a => `<span class="modal-tag artifact"><i class="fa-solid fa-file-invoice"></i> ${a}</span>`).join('')}
      </div>
    </div>
  `;

  document.getElementById('modal-backdrop').classList.add('open');
  document.getElementById('modal-box').setAttribute('aria-label', step.title);
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-backdrop').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

let tooltipTimer;
function showTooltip(e, name, click = false) {
  clearTimeout(tooltipTimer);
  const tt = document.getElementById('tooltip');
  const desc = ARTIFACT_DESC[name] || "Documento pertinente a esta etapa do fluxo.";
  document.getElementById('tooltip-title').textContent = name;
  document.getElementById('tooltip-body').textContent = desc;
  const rect = e.currentTarget.getBoundingClientRect();
  let top = rect.bottom + 8;
  let left = rect.left;
  if (left + 280 > window.innerWidth) left = window.innerWidth - 290;
  if (top + 100 > window.innerHeight) top = rect.top - 110;
  tt.style.top = top + 'px';
  tt.style.left = left + 'px';
  tt.classList.add('show');
  tt.setAttribute('aria-hidden', 'false');
  if (!click) { tooltipTimer = setTimeout(hideTooltip, 4000); }
}
function hideTooltip() {
  const tt = document.getElementById('tooltip');
  tt.classList.remove('show');
  tt.setAttribute('aria-hidden', 'true');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.artifact-card')) hideTooltip();
});

// --- UTILITÁRIOS --- //

function exportPhase() {
  const process = AUDIT_TYPES[currentProcessKey];
  if(!process.phases) return;
  const phase = process.phases[currentPhaseIndex];
  
  const summary = {
    Apresentacao: `Processo de ${process.title} - TSE`,
    Fase: phase.name,
    Etapas: phase.steps.map((s, si) => ({
      Numero: si + 1,
      Titulo: s.title,
      Descricao: s.fullDesc,
      Atores_Envolvidos: s.actors,
      Artefatos_Gerados: s.artifacts
    })),
    GeradoEm: new Date().toLocaleString('pt-BR')
  };
  const el = document.createElement('a');
  el.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(summary, null, 2));
  el.download = `Estrutura_${currentProcessKey}_${phase.name.toLowerCase()}.json`;
  el.click();
}

function toggleTheme() {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
  document.getElementById('theme-label').textContent = dark ? 'Modo Claro' : 'Modo Escuro';
  document.getElementById('theme-icon').className = dark ? 'fa-solid fa-sun' : 'fa-solid fa-circle-half-stroke';
}

// INICIALIZAÇÃO
setAuditProcess('ordinaria');

</script>
